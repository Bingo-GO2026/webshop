<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betaling geslaagd | Bingo-Go</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #0f172a 0%, #1a3a6b 55%, #0f172a 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: white; border-radius: 24px; padding: 56px 48px;
    max-width: 520px; width: 100%; text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
  }
  .check-circle {
    width: 88px; height: 88px; background: #dcfce7; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
  }
  .check-circle svg { width: 44px; height: 44px; stroke: #16a34a; stroke-width: 2.5; fill: none; }
  h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem;
    letter-spacing: 0.04em; color: #0f172a; margin-bottom: 16px;
  }
  p { color: #64748b; font-size: 1.05rem; font-weight: 600; line-height: 1.7; margin-bottom: 12px; }
  .email-highlight {
    background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px;
    padding: 12px 20px; color: #0369a1; font-weight: 700; font-size: 0.95rem;
    margin: 20px 0;
  }
  .btn {
    display: inline-block; margin-top: 28px;
    background: linear-gradient(135deg, #1a5bbf, #3a7fe8);
    color: white; padding: 14px 36px; border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
    text-decoration: none; border: none; cursor: pointer;
    box-shadow: 0 8px 24px rgba(26,91,191,0.35); transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(26,91,191,0.45); }
</style>
</head>
<body>
<div class="card">
  <div class="check-circle">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Betaling geslaagd! 🎉</h1>
  <p>Bedankt voor je bestelling van Bingo-Go <strong id="cityName"></strong>!</p>
  <div class="email-highlight" id="emailInfo">Je ontvangt je bingokaart binnenkort per e-mail.</div>
  <p style="font-size:0.9rem;">Geen e-mail ontvangen? Check je spam of neem contact op via <a href="mailto:BingoGo015@gmail.com" style="color:#1a5bbf">BingoGo015@gmail.com</a>.</p>
  <a href="/" class="btn">← Terug naar de website</a>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const city  = params.get('stad')  || '';
  const email = params.get('email') || '';
  if (city)  document.getElementById('cityName').textContent = city;
  if (email) document.getElementById('emailInfo').textContent = `Je bingokaart wordt gestuurd naar ${email}.`;
</script>
</body>
</html>
